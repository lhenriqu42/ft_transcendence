# version: "3.9"

# ============================================================
# INFRA PRONTA (sem código próprio) — baseado no diagrama:
#  - Redis Sessões (Auth)
#  - Redis Cache (BFF: perfil/feed genérico)
#  - Redis Feed/Likes/RateLimit (User/Media/Post)
#  - Postgres (1 instância, múltiplos DBs lógicos: auth, services)
#  - Kafka + Zookeeper (mensageria entre services e workers)
#  - MinIO (S3-compatible, substitui Cloudflare R2 localmente)
#  - Prometheus + Alertmanager + Grafana (observabilidade)
#  - Loki + Promtail (logs centralizados)
#  - Jaeger (tracing distribuído / OpenTelemetry)
# ============================================================

x-restart-policy: &restart_policy
  restart: unless-stopped

networks:
  backend:
    driver: bridge
  observability:
    driver: bridge

volumes:
  redis_sessions_data:
  redis_cache_data:
  redis_feed_data:
  postgres_data:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:

services:

  # ----------------------------------------------------------
  # REDIS — 3 instâncias físicas isoladas (conforme anotação no diagrama)
  # ----------------------------------------------------------
  redis-sessions:
    image: redis:7.4-alpine
    container_name: redis-sessions
    <<: *restart_policy
    command: >
      redis-server
      --requirepass ${REDIS_SESSIONS_PASSWORD:-changeme_sessions}
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
    ports:
      - "${REDIS_SESSIONS_PORT:-6379}:6379"
    volumes:
      - redis_sessions_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_SESSIONS_PASSWORD:-changeme_sessions}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7.4-alpine
    container_name: redis-cache
    <<: *restart_policy
    command: >
      redis-server
      --requirepass ${REDIS_CACHE_PASSWORD:-changeme_cache}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_CACHE_PORT:-6380}:6379"
    volumes:
      - redis_cache_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_CACHE_PASSWORD:-changeme_cache}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-feed:
    image: redis:7.4-alpine
    container_name: redis-feed
    <<: *restart_policy
    command: >
      redis-server
      --requirepass ${REDIS_FEED_PASSWORD:-changeme_feed}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_FEED_PORT:-6381}:6379"
    volumes:
      - redis_feed_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_FEED_PASSWORD:-changeme_feed}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # POSTGRES — 1 instância física, múltiplos DBs lógicos via script init
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    <<: *restart_policy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_pg}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ----------------------------------------------------------
  # KAFKA — mensageria assíncrona (Services -> Workers)
  # ----------------------------------------------------------

  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    <<: *restart_policy
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT # Mudar isso em Producao
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    <<: *restart_policy
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8089:8080"
    networks:
      - backend

  # ----------------------------------------------------------
  # MINIO — S3-compatible storage (substitui Cloudflare R2 em dev)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    <<: *restart_policy
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # OBSERVABILIDADE — Prometheus, Alertmanager, Grafana
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    <<: *restart_policy
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - backend
      - observability

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    <<: *restart_policy
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    <<: *restart_policy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme_grafana}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki

  # ----------------------------------------------------------
  # LOGS — Loki + Promtail (coleta de TODAS as partes do sistema)
  # ----------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: loki
    <<: *restart_policy
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    <<: *restart_policy
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability
    depends_on:
      - loki

  # ----------------------------------------------------------
  # TRACING — Jaeger (OpenTelemetry)
  # ----------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    <<: *restart_policy
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"   # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - backend
      - observability
      
  # ----------------------------------------------------------
  # NOTA: Sentry self-hosted é pesado (10+ containers, requer
  # bastante RAM). Recomendação: usar Sentry SaaS (free tier)
  # em vez de subir aqui. Se realmente precisar self-host,
  # use o docker-compose oficial deles em repo separado.
  # ----------------------------------------------------------





