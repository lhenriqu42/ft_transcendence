global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# rule_files:
#   - "rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Ajuste os nomes/portas abaixo conforme seus serviços expõem /metrics
  - job_name: bff
    metrics_path: /metrics
    static_configs:
      - targets: ['bff:3000']

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:3000']

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ['user-service:3000']

  - job_name: media-service
    metrics_path: /metrics
    static_configs:
      - targets: ['media-service:3000']

  - job_name: post-service
    metrics_path: /metrics
    static_configs:
      - targets: ['post-service:3000']

  - job_name: workers
    metrics_path: /metrics
    static_configs:
      - targets: ['workers:3000']
